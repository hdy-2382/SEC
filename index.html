<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>케미컬 체결/반송 자동화 시스템</title>
<!-- 캐시 우회: 수정 후 새로고침만 해도 styles.css가 바로 반영됨 -->
<script>document.write('<link rel="stylesheet" href="styles.css?t=' + Date.now() + '">');</script>
</head>
<body>
<div class="app">
  
  <main class="main">
    <div class="topbar">
      <h1 id="page-title">케미컬 체결/반송 자동화 시스템</h1>
      <div class="meta" id="topmeta"></div>
      <div class="sp"></div><div class="tb-lc" id="topbar-lc"></div><button class="btn" id="print-btn" onclick="window.print()">PDF 리포트</button>
    </div>
    <nav class="nav nav-top" id="nav"></nav>

    <section id="s-overview" class="sbox"></section>
    <section id="s-status" class="sbox"></section>
    <section id="s0" class="sbox"></section>
    <div class="sbox sbox-steps" id="s-steps"></div>
    <section id="s-info" class="sbox"></section>
  </main>
</div>

<!-- 에러 상세 모달 -->
<div class="modal-back" id="modal-back" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-h"><h3 id="modal-title">에러 상세</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b" id="modal-body"></div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img" alt=""></div>

<!-- 캐시 우회: 수정 후 새로고침만 해도 app.js가 바로 반영됨 -->
<script>document.write('<script src="app.js?t=' + Date.now() + '"><\/script>');</script>
</body>
</html>

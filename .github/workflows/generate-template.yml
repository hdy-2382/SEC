name: Generate vendor template

on:
  push:
    branches: [main]
    paths:
      - "scripts/generate_vendor_template.py"
      - ".github/workflows/generate-template.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-template
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate vendor template xlsx
        run: python scripts/generate_vendor_template.py

      - name: Commit template
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/vendor_template.xlsx; then
            echo "변경사항 없음, 커밋 생략"
            exit 0
          fi
          git add data/vendor_template.xlsx
          git commit -m "chore(template): 업체 양식 xlsx 재생성"
          git push
